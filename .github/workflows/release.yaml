name: "Publish Release"

on:
  push:
    tags:
      - "v*" # v1.0.0 や v0.1.0 などのタグがプッシュされたら起動

permissions:
  contents: write # GitHub Releasesに書き込むために必要

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Mac版ビルド用
            args: "--target universal-apple-darwin"
          - platform: "windows-latest" # Windows版（exe/msi）ビルド用
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          # MacでIntel/Apple Silicon両対応のUniversal Binaryを作るためのターゲット
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      # Tauri 2.0 対応の公式アクションを使ってビルド＆自動リリース
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "daw-focus-lock ${{ github.ref_name }}"
          releaseBody: "🤖 GitHub Actions による自動ビルド配信です。"
          releaseDraft: true # 最初は下書き(Draft)として作成（確認後に公開できるので安全）
          prerelease: false
          args: ${{ matrix.args }}
